name = "matmailer"
main = "src/index.js"
compatibility_date = "2024-04-28"

[vars]
MAIL_DOMAIN = "ahmats.store"

[[d1_databases]]
binding = "DB"
database_name = "matmailer_db"
database_id = "PLACEHOLDER_D1_ID"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "matmailer-eml"

[[kv_namespaces]]
binding = "KV"
id = "PLACEHOLDER_KV_ID"

[assets]
directory = "public"
binding = "ASSETS"
