name: 🚀 Deploy MatMailer to Cloudflare

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Deploy-MatMailer:
    name: 🏗️ Build and Deploy
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DB_NAME: 'matmailer_db'
      KV_NAME: 'KV'

    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        run: npm install

      # Trik: Rename wrangler.toml sementara biar nggak ganggu proses pencarian ID
      - name: 🛠️ Prepare Environment
        run: |
          if [ -f "wrangler.toml" ]; then mv wrangler.toml wrangler.toml.bak; fi

      - name: ⚡ Set up KV Namespace
        run: |
          # Ambil ID KV tanpa keganggu file config yang rusak
          KV_LIST=$(npx wrangler kv namespace list --json)
          if echo "$KV_LIST" | jq -e ".[] | select(.title | contains(\"matmailer-$KV_NAME\"))" > /dev/null 2>&1; then
            KV_ID=$(echo "$KV_LIST" | jq -r ".[] | select(.title | contains(\"matmailer-$KV_NAME\")) | .id")
          else
            npx wrangler kv namespace create "$KV_NAME"
            KV_ID=$(npx wrangler kv namespace list --json | jq -r ".[] | select(.title | contains(\"matmailer-$KV_NAME\")) | .id")
          fi
          echo "KV_ID=$KV_ID" >> $GITHUB_ENV

      - name: 🐬 Set up D1 database
        run: |
          # Ambil ID D1 tanpa keganggu file config
          DB_LIST=$(npx wrangler d1 list --json)
          if echo "$DB_LIST" | jq -e ".[] | select(.name == \"$D1_DB_NAME\")" > /dev/null 2>&1; then
            D1_ID=$(echo "$DB_LIST" | jq -r ".[] | select(.name == \"$D1_DB_NAME\") | .uuid")
          else
            npx wrangler d1 create "$D1_DB_NAME"
            D1_ID=$(npx wrangler d1 list --json | jq -r ".[] | select(.name == \"$D1_DB_NAME\") | .uuid")
          fi
          echo "D1_ID=$D1_ID" >> $GITHUB_ENV

      # Balikin lagi filenya terus suntik ID-nya
      - name: 🔧 Generate Final Config
        run: |
          mv wrangler.toml.bak wrangler-deploy.toml
          sed -i "/database_name = \"$D1_DB_NAME\"/a database_id = \"$D1_ID\"" wrangler-deploy.toml
          sed -i "/binding = \"KV\"/a id = \"$KV_ID\"" wrangler-deploy.toml
          echo "✅ Config final berhasil dibuat dengan ID asli."

      - name: 📦 Set up R2 bucket
        run: |
          BUCKET_LIST=$(npx wrangler r2 bucket list 2>&1)
          if ! echo "$BUCKET_LIST" | grep -q "matmailer-eml"; then
            npx wrangler r2 bucket create "matmailer-eml"
          fi

      - name: 🗄️ Initialize D1 database tables
        run: |
          if [ -f "d1-init.sql" ]; then
            npx wrangler d1 execute "$D1_DB_NAME" -c wrangler-deploy.toml --file=d1-init.sql --remote --yes
          fi

      - name: 🚀 Start deployment
        run: npx wrangler deploy -c wrangler-deploy.toml
