name: 🚀 Deploy MatMailer to Cloudflare

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  Deploy-MatMailer:
    name: 🏗️ Build and Deploy
    runs-on: ubuntu-latest

    env:
      # Nama Worker
      NAME: ${{ secrets.NAME || vars.NAME || 'matmailer' }}
      # Cloudflare Credentials
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # D1 Database
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID || vars.D1_DATABASE_ID }}
      D1_DB_NAME: ${{ secrets.D1_DB_NAME || vars.D1_DB_NAME || 'matmailer_db' }}
      # R2 Bucket
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || vars.R2_BUCKET_NAME || 'matmailer-eml' }}
      # MatMailer Vars
      MAIL_DOMAIN: ${{ secrets.MAIL_DOMAIN || vars.MAIL_DOMAIN || 'ahmats.store' }}
      JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
      ADMIN_NAME: ${{ secrets.ADMIN_NAME || 'admin' }}

    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20

      - name: 📦 Install dependencies
        run: npm install

      - name: 📦 Install Wrangler
        run: npm install -g wrangler

      - name: 🛠️ Generate wrangler config
        run: |
          echo "🛠️ Generating deployment wrangler config..."
          CONFIG_FILE="wrangler-deploy.toml"
          cp wrangler.toml "$CONFIG_FILE"

          # Ganti Nama Worker
          sed -i "s|^name = .*|name = \"${NAME}\"|" "$CONFIG_FILE"

          # Ganti database_id dan name
          sed -i 's/^[[:space:]]*database_id = .*/database_id = "PLACEHOLDER_D1_ID"/' "$CONFIG_FILE"
          sed -i "s/^[[:space:]]*database_name = .*/database_name = \"${D1_DB_NAME}\"/" "$CONFIG_FILE"

          # Ganti R2 bucket
          sed -i "s/^[[:space:]]*bucket_name = .*/bucket_name = \"${R2_BUCKET_NAME}\"/" "$CONFIG_FILE"

          # Suntik Vars MatMailer
          if [ -n "$MAIL_DOMAIN" ]; then
            sed -i "s|^MAIL_DOMAIN=.*|MAIL_DOMAIN=\"${MAIL_DOMAIN}\"|" "$CONFIG_FILE"
          fi
          if [ -n "$JWT_TOKEN" ]; then
            sed -i "s|^JWT_TOKEN=.*|JWT_TOKEN=\"${JWT_TOKEN}\"|" "$CONFIG_FILE"
          fi

          echo "✅ Config generated."

      - name: 🐬 Set up D1 database
        run: |
          CONFIG_FILE="wrangler-deploy.toml"
          if [ -n "$D1_DATABASE_ID" ]; then
            sed -i "s|PLACEHOLDER_D1_ID|${D1_DATABASE_ID}|g" "$CONFIG_FILE"
            exit 0
          fi

          DB_LIST=$(wrangler d1 list --json)
          if echo "$DB_LIST" | jq -e ".[] | select(.name == \"${D1_DB_NAME}\")" > /dev/null 2>&1; then
            D1_ID=$(echo "$DB_LIST" | jq -r ".[] | select(.name == \"${D1_DB_NAME}\") | .uuid")
          else
            wrangler d1 create "${D1_DB_NAME}"
            D1_ID=$(wrangler d1 list --json | jq -r ".[] | select(.name == \"${D1_DB_NAME}\") | .uuid")
          fi
          sed -i "s|PLACEHOLDER_D1_ID|$D1_ID|g" "$CONFIG_FILE"

      - name: 📦 Set up R2 bucket
        run: |
          BUCKET_LIST=$(wrangler r2 bucket list 2>&1)
          if ! echo "$BUCKET_LIST" | grep -q "${R2_BUCKET_NAME}"; then
            wrangler r2 bucket create "${R2_BUCKET_NAME}"
          fi

      - name: 🗄️ Initialize D1 Tables
        run: |
          if [ -f "d1-init.sql" ]; then
            wrangler d1 execute "${D1_DB_NAME}" -c wrangler-deploy.toml --file=d1-init.sql --remote --yes
          fi

      - name: 🚀 Deploy
        run: wrangler deploy -c wrangler-deploy.toml
